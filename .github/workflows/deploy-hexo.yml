name: Hexo Auto Deploy Git
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install npm dependencies
        run: npm install

      - name: Config git identity
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@github.com"

      # 核心修复：拼接带 PAT 的仓库地址，注入环境变量给 hexo 读取
      - name: Hexo generate & deploy
        env:
          GH_PAT: ${{ secrets.HEXO_TOKEN }}
          # 拼接鉴权仓库地址
          DEPLOY_REPO: https://${{ secrets.HEXO_TOKEN }}@github.com/Othixx/my-blog.git
        run: |
          npx hexo clean
          npx hexo generate
          # 临时覆盖部署仓库地址，强制使用带token的链接
          npx hexo deploy --config <(echo "deploy: {type: git, repo: $DEPLOY_REPO, branch: master}")
