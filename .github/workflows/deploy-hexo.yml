name: Hexo Auto Deploy Git Official Token Rule
on:
  push:
    branches: [ main ]

# 允许工作流使用写权限推送
permissions:
  contents: write

# 全局注入环境变量，插件初始化时就能读取
env:
  GH_TOKEN: ${{ secrets.HEXO_TOKEN }}

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Set git user info
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@github.com"

      - name: Execute hexo clean + generate
        run: |
          npx hexo clean
          npx hexo generate

      - name: Set repo remote to use token
        # 关键步骤：把 origin 改为含 token 的 HTTPS URL，供后续 hexo-deployer-git 使用
        run: |
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git

      - name: Deploy (hexo)
        run: |
          echo "===== hexo deploy 开始 ====="
          npx hexo deploy
          echo "===== hexo deploy 完成 ====="
