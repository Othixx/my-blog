name: Hexo Auto Deploy Git Force Run Deploy
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout blog source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Config git identity
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@github.com"

      # 完全不用 EOF，单行echo逐行写入临时配置
      - name: Rewrite deploy config without EOF
        env:
          HEXO_PAT: ${{ secrets.HEXO_TOKEN }}
        run: |
          AUTH_URL="https://${HEXO_PAT}@github.com/Othixx/my-blog.git"
          rm -f deploy.tmp
          echo "deploy:" >> deploy.tmp
          echo "  type: git" >> deploy.tmp
          echo "  repo: ${AUTH_URL}" >> deploy.tmp
          echo "  branch: master" >> deploy.tmp
          echo "  message: Auto update by GitHub Actions" >> deploy.tmp
          # 删除原有旧deploy配置块
          sed -i '/^deploy:/,/^[^ ]/d' _config.yml
          # 追加新配置
          cat deploy.tmp >> _config.yml
          rm deploy.tmp

      - name: Run full hexo pipeline
        run: |
          echo "==== hexo clean start ===="
          npx hexo clean
          echo "==== hexo generate start ===="
          npx hexo generate
          echo "==== hexo deploy start ===="
          npx hexo deploy
          echo "==== hexo deploy finished ===="
