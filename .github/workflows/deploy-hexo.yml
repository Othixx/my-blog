name: Hexo Auto Deploy Git
on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      # 拉取博客源码
      - name: Checkout blog source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # Node 环境
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # 安装依赖
      - name: Install npm dependencies
        run: npm install

      # 配置git提交身份
      - name: Config git user
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@github.com"

      # 构建+部署，注入GH_TOKEN给hexo配置读取
      - name: Hexo Build & Deploy
        env:
          GH_TOKEN: ${{ secrets.HEXO_TOKEN }}
        run: |
          npx hexo clean
          echo "===== 开始生成静态文件 ====="
          npx hexo generate
          echo "===== 开始执行deploy推送 ====="
          npx hexo deploy
          echo "===== deploy执行完成 ====="
